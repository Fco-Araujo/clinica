<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Clínica MassoFisio</title>
  <link rel="stylesheet" href="./css/login.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body>
  <main class="login-page">
    <section class="login-box">
      <div class="logo-area">
        <img
          src="./assets/logo-massofisio.png"
          alt="Logo Clínica MassoFisio"
          class="logo-img"
        />
      </div>

      <h1 class="login-title">Bem-vindo de volta!</h1>

      <form id="loginForm" class="login-form">
        <div class="input-group">
          <span class="input-icon">
            <i class="fa-regular fa-envelope"></i>
          </span>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="E-mail"
            required
            autocomplete="email"
          />
        </div>

        <div class="input-group">
          <span class="input-icon">
            <i class="fa-solid fa-lock"></i>
          </span>
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="Senha"
            required
            autocomplete="current-password"
          />
          <button type="button" id="toggleSenha" class="toggle-password">
            Mostrar
          </button>
        </div>

        <div class="forgot-password">
          <a href="#">Esqueceu sua senha?</a>
        </div>

        <button type="submit" id="btnEntrar" class="btn-login">
          Entrar
        </button>

        <p id="mensagem" class="mensagem-feedback"></p>
      </form>

      <p class="login-footer">
        Sistema de gestão de agendamentos da Clínica MassoFisio.
      </p>
    </section>
  </main>

  <script src="./js/login.js"></script>
</body>
</html>
